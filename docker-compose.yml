services:
  bot:
    build: ./bot
    env_file:
      - ./bot/.env
    restart: unless-stopped
    volumes:
      - ./bot/data:/app/data
    shm_size: 1gb
    ports:
      - "4000:4000"   # <— вот это
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:4000/health || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3